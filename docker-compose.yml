version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aira_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airadb
    ports:
      - "15432:5432"
    volumes:
      - postgres_data_aira:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_aira:
